<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythic Kingdom</title>

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<h1 class="title">⚔️ Mythic Kingdom</h1>

<div class="card">
  <p>Level: <span id="level">1</span></p>
  <p>XP: <span id="xp">0</span> / <span id="xpMax">100</span></p>
  <p>Gold: <span id="gold">0</span></p>
</div>

<div id="enemyBox" class="card">
  <h2>🧟 Gegner</h2>
  <p id="enemy">Schleim (HP: 30)</p>
  <button onclick="attack()">⚔️ Angreifen</button>
</div>

<div class="card">
  <h2>🎒 Inventar</h2>
  <ul id="inventory"></ul>
</div>

<div class="card">
  <h2>🏪 Shop</h2>
  <button onclick="buyPotion()">❤️ Heiltrank (50 Gold)</button>
</div>

<div class="card">
  <h2>📜 Quest</h2>
  <p id="quest">Besiege 10 Gegner (0/10)</p>
</div>

</body>
</html>
